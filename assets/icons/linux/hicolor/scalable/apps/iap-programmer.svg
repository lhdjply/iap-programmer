<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- 背景圆形 -->
  <circle cx="128" cy="128" r="120" fill="#2c3e50"/>
  
  <!-- 芯片主体 -->
  <rect x="68" y="68" width="120" height="120" rx="8" fill="#3498db" stroke="#2980b9" stroke-width="4"/>
  
  <!-- 芯片引脚 -->
  <g stroke="#2980b9" stroke-width="3">
    <!-- 左侧引脚 -->
    <line x1="68" y1="76" x2="56" y2="76"/>
    <line x1="68" y1="92" x2="56" y2="92"/>
    <line x1="68" y1="108" x2="56" y2="108"/>
    <line x1="68" y1="124" x2="56" y2="124"/>
    <line x1="68" y1="140" x2="56" y2="140"/>
    <line x1="68" y1="156" x2="56" y2="156"/>
    <line x1="68" y1="172" x2="56" y2="172"/>
    <line x1="68" y1="188" x2="56" y2="188"/>
    
    <!-- 右侧引脚 -->
    <line x1="188" y1="76" x2="200" y2="76"/>
    <line x1="188" y1="92" x2="200" y2="92"/>
    <line x1="188" y1="108" x2="200" y2="108"/>
    <line x1="188" y1="124" x2="200" y2="124"/>
    <line x1="188" y1="140" x2="200" y2="140"/>
    <line x1="188" y1="156" x2="200" y2="156"/>
    <line x1="188" y1="172" x2="200" y2="172"/>
    <line x1="188" y1="188" x2="200" y2="188"/>
    
    <!-- 顶部引脚 -->
    <line x1="76" y1="68" x2="76" y2="56"/>
    <line x1="92" y1="68" x2="92" y2="56"/>
    <line x1="108" y1="68" x2="108" y2="56"/>
    <line x1="124" y1="68" x2="124" y2="56"/>
    <line x1="140" y1="68" x2="140" y2="56"/>
    <line x1="156" y1="68" x2="156" y2="56"/>
    <line x1="172" y1="68" x2="172" y2="56"/>
    
    <!-- 底部引脚 -->
    <line x1="76" y1="188" x2="76" y2="200"/>
    <line x1="92" y1="188" x2="92" y2="200"/>
    <line x1="108" y1="188" x2="108" y2="200"/>
    <line x1="124" y1="188" x2="124" y2="200"/>
    <line x1="140" y1="188" x2="140" y2="200"/>
    <line x1="156" y1="188" x2="156" y2="200"/>
    <line x1="172" y1="188" x2="172" y2="200"/>
  </g>
  
  <!-- 编程/数据传输符号 -->
  <g fill="#ecf0f1">
    <!-- 中心传输符号 -->
    <path d="M128 96 L148 128 L128 160 L108 128 Z"/>
    
    <!-- 数据传输波纹 -->
    <circle cx="128" cy="128" r="20" fill="none" stroke="#ecf0f1" stroke-width="2"/>
    <circle cx="128" cy="128" r="36" fill="none" stroke="#ecf0f1" stroke-width="2"/>
  </g>
  
  <!-- 芯片内部细节 -->
  <rect x="88" y="88" width="80" height="80" rx="4" fill="none" stroke="#2980b9" stroke-width="2"/>
  <rect x="104" y="104" width="48" height="48" rx="2" fill="none" stroke="#2980b9" stroke-width="2"/>
</svg>